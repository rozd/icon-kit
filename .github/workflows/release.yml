name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and create release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # --- Determine base version and commit range -----------------------

          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            BASE_VERSION="0.0.0"
            RANGE="HEAD"
          else
            BASE_VERSION="${LATEST_TAG#v}"
            RANGE="${LATEST_TAG}..HEAD"
          fi

          COMMITS=$(git log --format="%H %s" "$RANGE")

          if [ -z "$COMMITS" ]; then
            echo "No new commits since ${LATEST_TAG}. Skipping."
            exit 0
          fi

          # --- Analyse commits (Conventional Commits) ------------------------

          BUMP="none"
          FEAT_LOG=""
          FIX_LOG=""
          PERF_LOG=""
          DOCS_LOG=""
          OTHER_LOG=""

          while IFS= read -r line; do
            HASH="${line%% *}"
            MSG="${line#* }"
            SHORT_HASH="${HASH:0:7}"

            # Detect breaking changes (! suffix or BREAKING CHANGE trailer)
            if echo "$MSG" | grep -qE '^[a-z]+(\(.+\))?!:'; then
              BUMP="major"
            elif echo "$MSG" | grep -qi 'BREAKING CHANGE'; then
              BUMP="major"
            fi

            # Extract type and description
            TYPE=$(echo "$MSG" | sed -nE 's/^([a-z]+)(\(.+\))?(!)? *:.*/\1/p')
            DESC=$(echo "$MSG" | sed -nE 's/^[a-z]+(\(.+\))?(!)? *: *(.*)/\3/p')

            if [ -z "$TYPE" ]; then
              TYPE="other"
              DESC="$MSG"
            fi

            ENTRY="- ${DESC} (\`${SHORT_HASH}\`)"

            case "$TYPE" in
              feat)
                [ "$BUMP" != "major" ] && BUMP="minor"
                FEAT_LOG="${FEAT_LOG}${ENTRY}"$'\n'
                ;;
              fix)
                [ "$BUMP" = "none" ] && BUMP="patch"
                FIX_LOG="${FIX_LOG}${ENTRY}"$'\n'
                ;;
              perf)
                [ "$BUMP" = "none" ] && BUMP="patch"
                PERF_LOG="${PERF_LOG}${ENTRY}"$'\n'
                ;;
              docs)
                [ "$BUMP" = "none" ] && BUMP="patch"
                DOCS_LOG="${DOCS_LOG}${ENTRY}"$'\n'
                ;;
              *)
                [ "$BUMP" = "none" ] && BUMP="patch"
                OTHER_LOG="${OTHER_LOG}${ENTRY}"$'\n'
                ;;
            esac
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No version-bumping commits (feat/fix/perf/breaking). Skipping."
            exit 0
          fi

          # --- Calculate new version -----------------------------------------

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: ${BUMP}  ${BASE_VERSION} → ${NEW_TAG}"

          # --- Build changelog ------------------------------------------------

          BODY="## What's Changed"

          [ -n "$FEAT_LOG" ]  && BODY="${BODY}"$'\n\n'"### Features"$'\n'"${FEAT_LOG}"
          [ -n "$FIX_LOG" ]   && BODY="${BODY}"$'\n\n'"### Bug Fixes"$'\n'"${FIX_LOG}"
          [ -n "$PERF_LOG" ]  && BODY="${BODY}"$'\n\n'"### Performance"$'\n'"${PERF_LOG}"
          [ -n "$DOCS_LOG" ]  && BODY="${BODY}"$'\n\n'"### Documentation"$'\n'"${DOCS_LOG}"
          [ -n "$OTHER_LOG" ] && BODY="${BODY}"$'\n\n'"### Other Changes"$'\n'"${OTHER_LOG}"

          if [ -n "$LATEST_TAG" ]; then
            BODY="${BODY}"$'\n'"**Full Changelog**: https://github.com/${REPO}/compare/${LATEST_TAG}...${NEW_TAG}"
          fi

          # --- Tag and release ------------------------------------------------

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes "$BODY"

          echo "Released ${NEW_TAG}"

          # --- Export version for downstream steps ----------------------------

          VERSION="${NEW_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "released=true" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        if: steps.create_release.outputs.released == 'true'
        env:
          VERSION: ${{ steps.create_release.outputs.version }}
          TAG: ${{ steps.create_release.outputs.tag }}
          REPO: ${{ github.repository }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          # Download source tarball and compute SHA256
          curl -sL "https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz" -o source.tar.gz
          SHA256=$(sha256sum source.tar.gz | awk '{print $1}')
          echo "SHA256: ${SHA256}"

          # Clone the Homebrew tap repository
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/rozd/homebrew-iconkit.git" tap
          cd tap

          # Write updated formula
          mkdir -p Formula
          cat > Formula/iconkit.rb << FORMULA_EOF
          class Iconkit < Formula
            desc "CLI tool for working with Apple .icon bundles"
            homepage "https://github.com/rozd/icon-kit"
            url "https://github.com/rozd/icon-kit/archive/refs/tags/v${VERSION}.tar.gz"
            sha256 "${SHA256}"
            license "MIT"

            depends_on xcode: ["16.0", :build]
            depends_on :macos

            def install
              system "swift", "build", "--disable-sandbox", "--configuration", "release"
              bin.install ".build/release/iconkit"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/iconkit --version")
            end
          end
          FORMULA_EOF

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/iconkit.rb
          git diff --staged --quiet && echo "No formula changes" && exit 0
          git commit -m "Update iconkit to ${VERSION}"
          git push
